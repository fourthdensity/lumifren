version: '3.8'
services:
  # 1. Redis Database
  lumifren-redis-database:
    image: redis:7-alpine
    container_name: lumifren-redis-database
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # 2. Redis Dashboard (GUI)
  lumifren-redis-dashboard:
    image: rediscommander/redis-commander:latest
    container_name: lumifren-redis-dashboard
    environment:
      - REDIS_HOSTS=local:lumifren-redis-database:6379
    ports:
      - "5000:8081"
    restart: unless-stopped
volumes:
  redis-data:
